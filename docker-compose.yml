services:
  db:
    image: postgres:16-alpine
    container_name: mvp_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mvp_backend
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.parse-notify.schedule: "0 9 1 * *"
      ofelia.job-exec.parse-notify.command: "python manage.py notify_olympiad_updates --run-parser"
      ofelia.job-exec.course-reminder.schedule: "0 9 1 9 *"
      ofelia.job-exec.course-reminder.command: "python manage.py send_course_update_reminders"
      ofelia.job-exec.event-reminders.schedule: "0 9 * * *"
      ofelia.job-exec.event-reminders.command: "python manage.py send_event_reminders"
      ofelia.job-exec.student-events-notify.schedule: "0 10 * * 1"
      ofelia.job-exec.student-events-notify.command: "python manage.py notify_students_about_events --since-hours 168"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: mvp_scheduler
    depends_on:
      - backend
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/
    container_name: mvp_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  media_data:
  static_data:
