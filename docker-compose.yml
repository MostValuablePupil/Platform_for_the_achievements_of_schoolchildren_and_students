services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mvp_backend
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-0}
      SQLITE_PATH: /data/db.sqlite3
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost,192.168.0.81,backend}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://127.0.0.1,http://localhost,http://192.168.0.81}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1,http://localhost,http://192.168.0.81}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-0}
    volumes:
      - sqlite_data:/data
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    restart: unless-stopped
    labels:
      ofelia.enabled: "true"
      # Уведомления об олимпиадах: 1-е число каждого месяца в 09:00
      ofelia.job-exec.parse-notify.schedule: "0 9 1 * *"
      ofelia.job-exec.parse-notify.command: "python manage.py notify_olympiad_updates --run-parser"
      # Ежегодное напоминание обновить курс: 1 сентября в 09:00
      ofelia.job-exec.course-reminder.schedule: "0 9 1 9 *"
      ofelia.job-exec.course-reminder.command: "python manage.py send_course_update_reminders"
      # Ежедневные напоминания об отслеживаемых мероприятиях (за 3 дня и за 1 день)
      ofelia.job-exec.event-reminders.schedule: "0 9 * * *"
      ofelia.job-exec.event-reminders.command: "python manage.py send_event_reminders"

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: mvp_scheduler
    depends_on:
      - backend
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/}
    container_name: mvp_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data:
  static_data:
